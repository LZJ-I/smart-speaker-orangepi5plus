<svg xmlns="http://www.w3.org/2000/svg" width="920" height="440" viewBox="0 0 920 440" role="img" aria-labelledby="nqf-t nqf-d">
  <title id="nqf-t">smart-speaker-qtApp control surface</title>
  <desc id="nqf-d">Neon cyber Qt app focus</desc>
  <defs>
    <linearGradient id="nqf-sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f0520"/>
      <stop offset="100%" stop-color="#1a0a2e"/>
    </linearGradient>
    <filter id="nqf-g1" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="nqf-g2" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="b2"/>
      <feMerge><feMergeNode in="b2"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="920" height="440" fill="url(#nqf-sky)"/>
  <g stroke="#a78bfa" stroke-width="1" opacity="0.12">
    <line x1="0" y1="100" x2="920" y2="100"/><line x1="0" y1="200" x2="920" y2="200"/>
    <line x1="0" y1="300" x2="920" y2="300"/>
  </g>
  <text x="460" y="42" text-anchor="middle" fill="#c4b5fd" font-family="ui-monospace, monospace" font-size="15" filter="url(#nqf-g1)">smart-speaker-qtApp</text>
  <g transform="translate(120,78)" filter="url(#nqf-g2)">
    <rect width="480" height="300" rx="18" fill="rgba(167,139,250,0.06)" stroke="#a78bfa" stroke-width="2.5"/>
    <rect x="32" y="48" width="416" height="200" rx="8" fill="none" stroke="#c4b5fd" stroke-width="1.5"/>
    <text x="240" y="36" text-anchor="middle" fill="#e9d5ff" font-family="monospace" font-size="13">QT DESKTOP UI</text>
    <text x="48" y="88" fill="#ddd6fe" font-family="monospace" font-size="11">widgets: bind / player</text>
    <text x="48" y="118" fill="#ddd6fe" font-family="monospace" font-size="11">socket.cpp -> TCP</text>
    <rect x="48" y="150" width="160" height="36" rx="4" fill="none" stroke="#a78bfa" stroke-width="1.2"/>
    <text x="128" y="172" text-anchor="middle" fill="#c4b5fd" font-family="monospace" font-size="10">controls</text>
    <rect x="232" y="150" width="200" height="80" rx="4" fill="none" stroke="#7c3aed" stroke-width="1.2" stroke-dasharray="5 4"/>
    <text x="332" y="196" text-anchor="middle" fill="#a78bfa" font-family="monospace" font-size="10">UI forms (.ui)</text>
  </g>
  <g transform="translate(640,130)" filter="url(#nqf-g2)">
    <rect width="200" height="196" rx="8" fill="none" stroke="#f472b6" stroke-width="2"/>
    <line x1="24" y1="56" x2="176" y2="56" stroke="#f472b6" stroke-width="1.1"/>
    <line x1="24" y1="86" x2="176" y2="86" stroke="#f472b6" stroke-width="1.1"/>
    <text x="100" y="176" text-anchor="middle" fill="#f9a8d4" font-family="monospace" font-size="11">SERVER</text>
    <text x="100" y="194" text-anchor="middle" fill="#f472b6" font-family="monospace" font-size="9">same TCP hub</text>
  </g>
  <g stroke="#a78bfa" stroke-width="2.5" fill="none" filter="url(#nqf-g1)">
    <path d="M600 226 H640"/>
  </g>
  <g transform="translate(48,260)" filter="url(#nqf-g2)">
    <rect width="140" height="100" rx="8" fill="none" stroke="#22d3ee" stroke-width="1.5" opacity="0.85"/>
    <text x="70" y="118" text-anchor="middle" fill="#67e8f9" font-family="monospace" font-size="9">CLIENT</text>
  </g>
  <path d="M188 310 Q 460 380 640 260" fill="none" stroke="#22d3ee" stroke-width="1.2" stroke-dasharray="8 6" opacity="0.55" filter="url(#nqf-g1)"/>
  <text x="460" y="418" text-anchor="middle" fill="#6b21a8" font-family="monospace" font-size="10">neon / qt app focus</text>
</svg>
