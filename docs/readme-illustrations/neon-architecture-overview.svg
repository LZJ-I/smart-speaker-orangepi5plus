<svg xmlns="http://www.w3.org/2000/svg" width="920" height="420" viewBox="0 0 920 420" role="img" aria-labelledby="nar-t nar-d">
  <title id="nar-t">Repository map: client, cloud server, Qt app</title>
  <desc id="nar-d">Neon cyber overview</desc>
  <defs>
    <linearGradient id="nar-sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f0520"/>
      <stop offset="100%" stop-color="#1a0a2e"/>
    </linearGradient>
    <filter id="nar-g1" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="nar-g2" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="b2"/>
      <feMerge><feMergeNode in="b2"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="nar-cab" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="rgba(34,211,238,0.14)"/>
      <stop offset="50%" stop-color="rgba(34,211,238,0.05)"/>
      <stop offset="100%" stop-color="rgba(34,211,238,0.12)"/>
