<svg xmlns="http://www.w3.org/2000/svg" width="920" height="440" viewBox="0 0 920 440" role="img" aria-labelledby="ncf-t ncf-d">
  <title id="ncf-t">smart-speaker-client</title>
  <desc id="ncf-d">Front-view bookshelf speaker</desc>
  <defs>
    <linearGradient id="ncf-sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f0520"/>
      <stop offset="100%" stop-color="#1a0a2e"/>
    </linearGradient>
    <linearGradient id="ncf-cab" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="rgba(34,211,238,0.14)"/>
      <stop offset="50%" stop-color="rgba(34,211,238,0.05)"/>
      <stop offset="100%" stop-color="rgba(34,211,238,0.12)"/>
    </linearGradient>
    <radialGradient id="ncf-cone" cx="45%" cy="40%" r="55%">
      <stop offset="0%" stop-color="rgba(165,243,252,0.2)"/>
      <stop offset="55%" stop-color="rgba(34,211,238,0.1)"/>
      <stop offset="100%" stop-color="rgba(8,47,73,0.35)"/>
    </radialGradient>
    <filter id="ncf-edge" x="-15%" y="-15%" width="130%" height="130%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="920" height="440" fill="url(#ncf-sky)"/>
  <g stroke="#22d3ee" stroke-width="1" opacity="0.08">
    <line x1="0" y1="110" x2="920" y2="110"/><line x1="0" y1="220" x2="920" y2="220"/><line x1="0" y1="330" x2="920" y2="330"/>
  </g>
  <!-- centered cabinet: front baffle + drivers -->
  <g transform="translate(290,34)">
    <rect x="0" y="0" width="340" height="372" rx="20" fill="url(#ncf-cab)" stroke="#22d3ee" stroke-width="2.6" filter="url(#ncf-edge)"/>
    <rect x="0" y="0" width="340" height="372" rx="20" fill="none" stroke="#67e8f9" stroke-width="1.1" opacity="0.45"/>
    <rect x="24" y="28" width="292" height="286" rx="10" fill="rgba(8,20,35,0.25)" stroke="#5eead4" stroke-width="1.3" opacity="0.9"/>
    <g stroke="#22d3ee" stroke-width="1" opacity="0.35" fill="none">
      <circle cx="52" cy="52" r="3"/><circle cx="288" cy="52" r="3"/><circle cx="52" cy="290" r="3"/><circle cx="288" cy="290" r="3"/>
    </g>
    <!-- tweeter dome -->
    <g transform="translate(170,88)">
      <circle r="20" fill="none" stroke="#22d3ee" stroke-width="2.2"/>
      <circle r="14" fill="rgba(103,232,249,0.12)" stroke="#67e8f9" stroke-width="1.2"/>
      <path d="M -10 -6 Q 0 -14 10 -6" fill="none" stroke="#a5f3fc" stroke-width="1.4" stroke-linecap="round"/>
      <circle r="5" fill="rgba(165,243,252,0.35)" stroke="#ecfeff" stroke-width="0.8"/>
    </g>
    <!-- woofer: surround ring + cone + ribs + dust cap -->
    <g transform="translate(170,218)">
      <circle r="92" fill="none" stroke="#22d3ee" stroke-width="3" opacity="0.9"/>
      <circle r="78" fill="url(#ncf-cone)" stroke="#06b6d4" stroke-width="1.2" opacity="0.95"/>
      <g stroke="#22d3ee" stroke-width="1.1" stroke-linecap="round" opacity="0.45">
        <line x1="0" y1="-24" x2="0" y2="-64"/><line x1="17" y1="-17" x2="45.3" y2="-45.3"/>
        <line x1="24" y1="0" x2="64" y2="0"/><line x1="17" y1="17" x2="45.3" y2="45.3"/>
        <line x1="0" y1="24" x2="0" y2="64"/><line x1="-17" y1="17" x2="-45.3" y2="45.3"/>
        <line x1="-24" y1="0" x2="-64" y2="0"/><line x1="-17" y1="-17" x2="-45.3" y2="-45.3"/>
      </g>
      <circle r="22" fill="rgba(15,30,50,0.5)" stroke="#a5f3fc" stroke-width="1.4"/>
      <circle r="10" fill="rgba(236,254,255,0.15)" stroke="#cffafe" stroke-width="0.8"/>
    </g>
    <!-- bass-reflex port -->
    <rect x="118" y="308" width="104" height="22" rx="11" fill="rgba(6,20,40,0.55)" stroke="#22d3ee" stroke-width="1.4"/>
    <ellipse cx="170" cy="319" rx="38" ry="7" fill="none" stroke="#67e8f9" stroke-width="0.8" opacity="0.4"/>
    <!-- plinth -->
    <rect x="12" y="358" width="316" height="14" rx="5" fill="rgba(34,211,238,0.08)" stroke="#22d3ee" stroke-width="1.2"/>
    <rect x="48" y="374" width="44" height="6" rx="2" fill="#22d3ee" opacity="0.35"/>
    <rect x="248" y="374" width="44" height="6" rx="2" fill="#22d3ee" opacity="0.35"/>
  </g>
</svg>
