<svg xmlns="http://www.w3.org/2000/svg" width="920" height="440" viewBox="0 0 920 440" role="img" aria-labelledby="ncf-t ncf-d">
  <title id="ncf-t">smart-speaker-client</title>
  <desc id="ncf-d">Front-view bookshelf speaker</desc>
  <defs>
    <linearGradient id="ncf-sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f0520"/>
      <stop offset="100%" stop-color="#1a0a2e"/>
    </linearGradient>
    <linearGradient id="ncf-cab" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="rgba(34,211,238,0.14)"/>
      <stop offset="50%" stop-color="rgba(34,211,238,0.05)"/>
      <stop offset="100%" stop-color="rgba(34,211,238,0.12)"/>
    </linearGradient>
    <radialGradient id="ncf-cone" cx="45%" cy="40%" r="55%">
      <stop offset="0%" stop-color="rgba(165,243,252,0.2)"/>
      <stop offset="55%" stop-color="rgba(34,211,238,0.1)"/>
      <stop offset="100%" stop-color="rgba(8,47,73,0.35)"/>
    </radialGradient>
    <filter id="ncf-edge" x="-15%" y="-15%" width="130%" height="130%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="920" height="440" fill="url(#ncf-sky)"/>
  <g stroke="#22d3ee" stroke-width="1" opacity="0.08">
    <line x1="0" y1="110" x2="920" y2="110"/><line x1="0" y1="220" x2="920" y2="220"/><line x1="0" y1="330" x2="920" y2="330"/>
  </g>
  <g transform="translate(320,58)">
    <rect x="0" y="0" width="280" height="312" rx="17" fill="url(#ncf-cab)" stroke="#22d3ee" stroke-width="2.4" filter="url(#ncf-edge)"/>
    <rect x="0" y="0" width="280" height="312" rx="17" fill="none" stroke="#67e8f9" stroke-width="1" opacity="0.45"/>
    <rect x="18" y="22" width="244" height="238" rx="9" fill="rgba(8,20,35,0.25)" stroke="#5eead4" stroke-width="1.2" opacity="0.9"/>
    <g stroke="#22d3ee" stroke-width="1" opacity="0.35" fill="none">
      <circle cx="40" cy="40" r="3"/><circle cx="240" cy="40" r="3"/><circle cx="40" cy="242" r="3"/><circle cx="240" cy="242" r="3"/>
    </g>
    <!-- tweeter: larger dome vs previous small circle -->
    <g transform="translate(140,78)">
      <circle r="24" fill="none" stroke="#22d3ee" stroke-width="2"/>
      <circle r="17" fill="rgba(103,232,249,0.12)" stroke="#67e8f9" stroke-width="1.15"/>
      <path d="M -12 -7 Q 0 -17 12 -7" fill="none" stroke="#a5f3fc" stroke-width="1.35" stroke-linecap="round"/>
      <circle r="7" fill="rgba(165,243,252,0.35)" stroke="#ecfeff" stroke-width="0.75"/>
    </g>
    <!-- woofer: smaller surround vs cabinet than before -->
    <g transform="translate(140,188)">
      <circle r="64" fill="none" stroke="#22d3ee" stroke-width="2.6" opacity="0.9"/>
      <circle r="54" fill="url(#ncf-cone)" stroke="#06b6d4" stroke-width="1.1" opacity="0.95"/>
      <g stroke="#22d3ee" stroke-width="1" stroke-linecap="round" opacity="0.45">
        <line x1="0" y1="-18" x2="0" y2="-48"/><line x1="12.7" y1="-12.7" x2="33.9" y2="-33.9"/>
        <line x1="18" y1="0" x2="48" y2="0"/><line x1="12.7" y1="12.7" x2="33.9" y2="33.9"/>
        <line x1="0" y1="18" x2="0" y2="48"/><line x1="-12.7" y1="12.7" x2="-33.9" y2="33.9"/>
        <line x1="-18" y1="0" x2="-48" y2="0"/><line x1="-12.7" y1="-12.7" x2="-33.9" y2="-33.9"/>
      </g>
      <circle r="18" fill="rgba(15,30,50,0.5)" stroke="#a5f3fc" stroke-width="1.25"/>
      <circle r="9" fill="rgba(236,254,255,0.15)" stroke="#cffafe" stroke-width="0.75"/>
    </g>
    <rect x="96" y="258" width="88" height="18" rx="9" fill="rgba(6,20,40,0.55)" stroke="#22d3ee" stroke-width="1.25"/>
    <ellipse cx="140" cy="267" rx="32" ry="6" fill="none" stroke="#67e8f9" stroke-width="0.75" opacity="0.4"/>
    <rect x="10" y="298" width="260" height="12" rx="4" fill="rgba(34,211,238,0.08)" stroke="#22d3ee" stroke-width="1.1"/>
    <rect x="40" y="312" width="36" height="5" rx="2" fill="#22d3ee" opacity="0.35"/>
    <rect x="204" y="312" width="36" height="5" rx="2" fill="#22d3ee" opacity="0.35"/>
  </g>
</svg>
