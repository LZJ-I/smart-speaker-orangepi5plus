    <text x="160" y="242" text-anchor="middle" fill="#f472b6" font-family="monospace" font-size="10" opacity="0.95">libevent + json + ssl</text>
    <text x="160" y="262" text-anchor="middle" fill="#f472b6" font-family="monospace" font-size="10" opacity="0.95">musicplayer_info</text>
