    <text x="40" y="118" fill="#fbcfe8" font-family="monospace" font-size="11">account + MySQL</text>
    <text x="40" y="148" fill="#fbcfe8" font-family="monospace" font-size="11">local library scan</text>
    <text x="40" y="178" fill="#fbcfe8" font-family="monospace" font-size="11">static / Apache disk</text>
