<svg xmlns="http://www.w3.org/2000/svg" width="920" height="440" viewBox="0 0 920 440" role="img" aria-labelledby="nsf-t nsf-d">
  <title id="nsf-t">smart-speaker-server hub</title>
  <desc id="nsf-d">Neon cyber server focus</desc>
  <defs>
    <linearGradient id="nsf-sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f0520"/>
      <stop offset="100%" stop-color="#1a0a2e"/>
    </linearGradient>
    <filter id="nsf-g1" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="nsf-g2" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="b2"/>
      <feMerge><feMergeNode in="b2"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="920" height="440" fill="url(#nsf-sky)"/>
  <g stroke="#f472b6" stroke-width="1" opacity="0.12">
    <line x1="0" y1="100" x2="920" y2="100"/><line x1="0" y1="200" x2="920" y2="200"/>
    <line x1="0" y1="300" x2="920" y2="300"/>
  </g>
  <text x="460" y="42" text-anchor="middle" fill="#f9a8d4" font-family="ui-monospace, monospace" font-size="15" filter="url(#nsf-g1)">smart-speaker-server</text>
  <g transform="translate(72,140)" filter="url(#nsf-g2)">
    <rect width="168" height="168" rx="10" fill="none" stroke="#22d3ee" stroke-width="2"/>
